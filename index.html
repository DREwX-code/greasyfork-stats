<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="description" content="Dynamic GreasyFork statistics cards for your online profiles." />
  <style>
    body {
      margin: 0;

      display: grid;
      place-items: center;
      background: #0d1117;
      color: #f0f6fc;
      font-family: Arial, sans-serif;
    }

    main {
      max-width: 720px;
      padding: 40px 24px;
      text-align: center;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 12px;
    }

    p {
      color: #8b949e;
      font-size: 18px;
      line-height: 1.6;
    }

    img {
      margin: 28px 0;
      max-width: 100%;
    }

    code {
      display: block;
      margin-top: 20px;
      padding: 16px;
      border: 1px solid #30363d;
      border-radius: 8px;
      background: #161b22;
      color: #c9d1d9;
      overflow-x: auto;
      text-align: left;
    }

      color: #58a6ff;

      font-weight: 600;

<body>
  <main>
    <h1>GreasyFork Stats</h1>

    <img
      src="/api?user=1259433&theme=github_dark&lang=en"
